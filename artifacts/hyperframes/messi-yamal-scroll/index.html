<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#080b0a}
    @font-face{font-family:'Barlow Condensed';src:local('Barlow Condensed')}@font-face{font-family:'IBM Plex Mono';src:local('IBM Plex Mono')}
    #root{position:relative;width:1920px;height:1080px;overflow:hidden;background:#080b0a;font-family:'IBM Plex Mono',monospace;color:#f1f4ec}
    .source-bg{position:absolute;inset:-44px;width:calc(100% + 88px);height:calc(100% + 88px);background:url('source-reference.png') center/cover no-repeat;filter:contrast(.88) saturate(.52) blur(9px);opacity:.58}
    .player-half{position:absolute;top:0;bottom:0;width:50%;overflow:hidden;filter:drop-shadow(0 0 32px rgba(0,0,0,.7));background-image:url('source-reference.png');background-size:1920px 1080px;background-repeat:no-repeat}.player-half.left{left:0;background-position:left center}.player-half.right{left:50%;background-position:right center}
    .vignette{position:absolute;inset:0;background:radial-gradient(circle at 57% 43%,rgba(186,255,0,.06),rgba(8,11,10,0) 31%),linear-gradient(90deg,rgba(8,11,10,.4),rgba(8,11,10,0) 28%,rgba(8,11,10,.08) 72%,rgba(8,11,10,.45));pointer-events:none}
    .arg-wash,.esp-wash{position:absolute;inset:0;mix-blend-mode:screen;opacity:0;pointer-events:none}
    .arg-wash{background:radial-gradient(circle at 28% 48%,rgba(117,168,232,.72),rgba(117,168,232,0) 34%)}
    .esp-wash{background:radial-gradient(circle at 76% 46%,rgba(212,43,50,.72),rgba(212,43,50,0) 35%)}
    .center-line{position:absolute;left:50%;top:14%;width:3px;height:72%;background:#baff00;box-shadow:0 0 24px rgba(186,255,0,.65);transform-origin:center top}
    .scan{position:absolute;left:0;right:0;height:2px;top:18%;background:#baff00;opacity:.2;box-shadow:0 0 18px rgba(186,255,0,.75)}
    .pulse{position:absolute;left:50%;top:51%;width:250px;height:250px;border:2px solid rgba(186,255,0,.7);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 35px rgba(186,255,0,.18)}
    .rail{position:absolute;left:88px;right:88px;bottom:52px;height:50px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(241,244,236,.32);font-size:18px;letter-spacing:.16em;text-transform:uppercase;text-shadow:0 2px 8px #080b0a}
    .rail b{font-family:'Barlow Condensed',sans-serif;font-size:34px;color:#baff00;letter-spacing:.04em}.rail span:last-child{text-align:right}
    .grain{position:absolute;inset:0;opacity:.08;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.86' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.62'/%3E%3C/svg%3E");pointer-events:none}
    .dot{position:absolute;width:7px;height:7px;border-radius:50%;background:#baff00;box-shadow:0 0 13px #baff00}.d1{left:46%;top:27%}.d2{left:54%;top:33%}.d3{left:48%;top:69%}.d4{left:56%;top:62%}.d5{left:51%;top:20%}.d6{left:43%;top:57%}
  </style>
</head>
<body>
  <div id="root" data-composition-id="messi-yamal-scroll" data-start="0" data-duration="12" data-width="1920" data-height="1080" data-track-index="0">
    <div class="source-bg"></div>
    <div class="player-half left"></div>
    <div class="player-half right"></div>
    <div class="arg-wash"></div><div class="esp-wash"></div><div class="vignette"></div>
    <div class="center-line"></div><div class="scan"></div><div class="pulse"></div>
    <i class="dot d1"></i><i class="dot d2"></i><i class="dot d3"></i><i class="dot d4"></i><i class="dot d5"></i><i class="dot d6"></i>
    <div class="rail"><span>Argentina <b>19</b> gols</span><span>Histórico editorial</span><span>Espanha <b>13</b> gols</span></div>
    <div class="grain"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines=window.__timelines||{};
    const tl=gsap.timeline({paused:true});
    tl.from('.source-bg',{scale:1.14,opacity:.18,duration:2.2,ease:'power1.out'},.2);
    tl.from('.player-half.left',{x:-250,opacity:0,duration:1.7,ease:'expo.out'},.28);
    tl.from('.player-half.right',{x:260,opacity:0,duration:1.38,ease:'power4.out'},.62);
    tl.fromTo('.arg-wash',{x:-180,opacity:0},{x:0,opacity:.16,duration:1.45,ease:'expo.out'},.45);
    tl.fromTo('.esp-wash',{x:190,opacity:0},{x:0,opacity:.16,duration:1.1,ease:'power3.out'},.72);
    tl.from('.center-line',{scaleY:0,opacity:0,duration:.8,ease:'power4.out'},2.1);
    tl.from('.pulse',{scale:.12,opacity:0,duration:.66,ease:'back.out(1.6)'},2.55);
    tl.to('.pulse',{scale:1.42,opacity:.12,duration:2.1,ease:'sine.out',overwrite:'auto'},3.22);
    tl.from('.dot',{scale:0,opacity:0,duration:.35,stagger:.07,ease:'expo.out'},3.05);
    tl.to('.dot',{y:-36,opacity:.22,duration:3.6,stagger:.08,ease:'sine.inOut'},3.55);
    tl.from('.rail',{y:46,opacity:0,duration:.72,ease:'power3.out'},5.2);
    tl.from('.rail span',{x:22,opacity:0,duration:.9,stagger:.12,ease:'power2.out'},5.35);
    tl.fromTo('.scan',{y:-160,opacity:0},{y:690,opacity:.24,duration:2.2,ease:'power1.inOut'},6.1);
    tl.to('.source-bg',{scale:1.08,x:-12,duration:5.2,ease:'sine.inOut'},6.4);
    tl.to('.player-half.left',{x:18,scale:1.025,duration:5.1,ease:'sine.inOut'},6.45);
    tl.to('.player-half.right',{x:-18,scale:1.025,duration:4.8,ease:'power1.inOut'},6.62);
    tl.to('.arg-wash',{opacity:.23,duration:1.6,ease:'sine.inOut'},7.1);
    tl.to('.esp-wash',{opacity:.23,duration:1.4,ease:'power1.inOut'},7.35);
    tl.to('.center-line',{opacity:.28,boxShadow:'0 0 10px rgba(186,255,0,.3)',duration:1.8,ease:'sine.inOut'},9.7);
    tl.to('.grain',{opacity:.04,duration:1.4,ease:'power1.inOut'},10.3);
    window.__timelines['messi-yamal-scroll']=tl;
  </script>
</body>
</html>

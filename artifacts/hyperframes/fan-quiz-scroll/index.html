<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#080b0a}#root{position:relative;width:1920px;height:1080px;overflow:hidden;background:#080b0a}
.room{position:absolute;inset:0;background:radial-gradient(circle at 76% 35%,rgba(32,126,65,.22),rgba(8,11,10,0) 38%),#080b0a}.wall-line{position:absolute;left:51%;right:5%;top:15%;height:1px;background:#283029}.floor{position:absolute;left:42%;right:0;bottom:0;height:31%;background:#0e120f;clip-path:polygon(8% 0,100% 0,100% 100%,0 100%)}
.tv{position:absolute;z-index:1;right:7%;top:12%;width:760px;height:430px;padding:22px;background:#151b17;border:2px solid #313a33;box-shadow:0 28px 80px rgba(0,0,0,.62),0 0 70px rgba(38,155,76,.12)}.screen{position:relative;width:100%;height:100%;overflow:hidden;background:#174d2b}.pitch{position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.035) 50%,rgba(0,0,0,.035) 50%);background-size:120px 100%}.pitch:before{content:'';position:absolute;left:50%;top:0;bottom:0;width:3px;background:rgba(241,244,236,.58)}.pitch:after{content:'';position:absolute;left:50%;top:50%;width:150px;height:150px;border:3px solid rgba(241,244,236,.58);border-radius:50%;transform:translate(-50%,-50%)}.goal{position:absolute;right:8%;top:29%;width:132px;height:170px;border:5px solid rgba(241,244,236,.8);border-left-width:3px;background:repeating-linear-gradient(45deg,rgba(241,244,236,.16) 0 2px,rgba(241,244,236,0) 2px 16px)}.ball{position:absolute;left:18%;top:62%;width:28px;height:28px;border-radius:50%;background:#f1f4ec;box-shadow:0 0 18px rgba(241,244,236,.8)}.goal-flash{position:absolute;right:2%;top:8%;width:320px;height:320px;border-radius:50%;background:#baff00;filter:blur(45px);opacity:0}.tv-glow{position:absolute;z-index:0;right:4%;top:8%;width:850px;height:560px;background:rgba(43,171,85,.18);filter:blur(80px)}
.sofa{position:absolute;z-index:3;right:5%;bottom:5%;width:870px;height:230px;background:#171c18;border-radius:58px 58px 16px 16px;box-shadow:0 25px 50px #030504}.sofa:before{content:'';position:absolute;left:52px;right:52px;top:-80px;height:160px;background:#202720;border-radius:50px 50px 15px 15px}
.fan{position:absolute;z-index:5;right:25%;bottom:14%;width:330px;height:560px;transform-origin:center bottom}.torso{position:absolute;left:80px;bottom:0;width:190px;height:330px;background:#111612;border-radius:85px 85px 24px 24px;box-shadow:inset 28px 0 55px rgba(60,180,90,.1)}.head{position:absolute;left:111px;top:20px;width:130px;height:150px;background:#171d18;border-radius:54% 46% 48% 52%;box-shadow:inset 20px 0 35px rgba(72,190,101,.14)}.hair{position:absolute;left:105px;top:10px;width:142px;height:76px;background:#090c0a;border-radius:60% 55% 35% 25%;transform:rotate(-4deg)}.arm{position:absolute;top:205px;width:58px;height:260px;background:#151a16;border-radius:35px;transform-origin:29px 25px}.arm.left{left:74px;transform:rotate(30deg)}.arm.right{right:48px;transform:rotate(-27deg)}.forearm{position:absolute;left:2px;top:205px;width:54px;height:205px;background:#181e19;border-radius:30px;transform-origin:27px 25px}.arm.left .forearm{transform:rotate(-63deg)}.arm.right .forearm{transform:rotate(60deg)}
.phone{position:absolute;z-index:8;left:137px;top:385px;width:88px;height:166px;padding:8px;background:#050706;border:2px solid #39423b;border-radius:18px;box-shadow:0 0 32px rgba(186,255,0,.14)}.phone-screen{height:100%;padding:16px 10px;background:#111713;border-radius:10px}.q-line{height:6px;width:82%;background:#657068;margin-bottom:15px}.choice{height:24px;margin:8px 0;border:1px solid #455047;border-radius:4px}.choice.selected{background:#baff00;border-color:#baff00}.confirm-ring{position:absolute;left:50%;top:50%;width:120px;height:120px;border:4px solid #baff00;border-radius:50%;transform:translate(-50%,-50%);opacity:0}
.ambient{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(8,11,10,.98) 0%,rgba(8,11,10,.82) 30%,rgba(8,11,10,.18) 58%,rgba(8,11,10,.05));}.particle{position:absolute;z-index:9;width:8px;height:8px;background:#baff00;border-radius:50%;opacity:0}.p1{left:66%;top:30%}.p2{left:72%;top:21%}.p3{left:79%;top:34%}.p4{left:83%;top:18%}.p5{left:88%;top:39%}.p6{left:75%;top:45%}
</style></head><body>
<div id="root" data-composition-id="fan-quiz-scroll" data-start="0" data-duration="12" data-width="1920" data-height="1080" data-track-index="0">
<div class="room"></div><div class="wall-line"></div><div class="floor"></div><div class="tv-glow"></div>

</div><script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script><script>

</script></body></html>
